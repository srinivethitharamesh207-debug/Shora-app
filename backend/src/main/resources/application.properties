# Application Configuration
spring.application.name=shora-app
server.port=8081

# Database Configuration (H2 File - persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/shoradb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=MyVerySecureSecretKeyThatIsLongEnoughForHS512AlgorithmAndCanBeUsedForJWTGeneration
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.shora=DEBUG
