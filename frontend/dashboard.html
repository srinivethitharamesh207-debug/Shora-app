<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shora - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <main class="dashboard-page">
        <section class="mobile-app">
            <header class="app-hero">
                <div class="hero-content">
                    <div>
                        <h1>Unlock Your Potential.<br>Learn &amp; Grow!</h1>
                        <p id="userName">Loading...</p>
                        <button id="logoutBtn" class="btn btn-signup" type="button">Log Out</button>
                    </div>
                    <div class="hero-book" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 5.5A2.5 2.5 0 0 1 5.5 3H20v15.5A2.5 2.5 0 0 0 17.5 16H5.5A2.5 2.5 0 0 1 3 13.5z"></path>
                            <path d="M20 18.5a2.5 2.5 0 0 1-2.5 2.5H5.5A2.5 2.5 0 0 1 3 18.5"></path>
                            <path d="M12 7v7"></path>
                        </svg>
                    </div>
                </div>
            </header>

            <section class="hero-illustration" aria-hidden="true">
                <div class="tree"></div>
                <div class="bubble b1"></div>
                <div class="bubble b2"></div>
                <div class="bubble b3"></div>
                <div class="students">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            </section>

            <section class="courses-section">
                <h2>Your Courses</h2>
                <div class="course-grid">
                    <article class="course-card">
                        <div class="badge">2</div>
                        <div class="course-icon python">Py</div>
                        <h3>Python Basics</h3>
                        <p>Beginner Level</p>
                    </article>

                    <article class="course-card">
                        <div class="badge">2</div>
                        <div class="course-icon profile">
                            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="4"></circle>
                                <path d="M4 20c1.7-3.2 4.2-5 8-5s6.3 1.8 8 5"></path>
                            </svg>
                        </div>
                        <h3>JavaScript Internals</h3>
                        <p>Web Development</p>
                    </article>

                    <article class="course-card">
                        <div class="badge">2</div>
                        <div class="course-icon java">☕</div>
                        <h3>Java for Beginners</h3>
                        <p>OOP Concepts</p>
                    </article>
                </div>
                <div class="slider-dots" aria-hidden="true">
                    <span class="active"></span><span></span><span></span>
                </div>
            </section>

            <section class="challenge-section">
                <h2>Daily Challenge</h2>
                <div class="challenge-grid">
                    <article>
                        <div class="challenge-icon">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                        </div>
                        <p>Web Development</p>
                    </article>
                    <article>
                        <div class="challenge-icon">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="7" y="2" width="10" height="20" rx="2"></rect>
                                <line x1="11" y1="18" x2="13" y2="18"></line>
                                <path d="M10 8h4"></path>
                            </svg>
                        </div>
                        <p>Mobile Dev</p>
                    </article>
                    <article>
                        <div class="challenge-icon">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                                <circle cx="20" cy="6" r="2"></circle>
                            </svg>
                        </div>
                        <p>Data Science</p>
                    </article>
                    <article>
                        <div class="challenge-icon">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 11h4v2H6zM14 9h4v2h-4z"></path>
                                <rect x="2" y="8" width="20" height="10" rx="4"></rect>
                            </svg>
                        </div>
                        <p>Game Dev</p>
                    </article>
                </div>
            </section>

            <nav class="bottom-nav" aria-label="Primary">
                <a class="nav-item active" href="index.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 10.5 12 3l9 7.5"></path>
                        <path d="M5 10v10h14V10"></path>
                    </svg>
                    <span>Home</span>
                </a>
                <a class="nav-item" href="search.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Search</span>
                </a>
                <a class="nav-item" href="progress.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 5h16v14H4z"></path>
                        <path d="M8 5v14"></path>
                        <path d="M16 5v14"></path>
                    </svg>
                    <span>Progress</span>
                </a>
                <a class="nav-item" href="practice.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3h10v18l-5-3-5 3z"></path>
                    </svg>
                    <span>Practice</span>
                </a>
                <a class="nav-item" href="profile.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M4 21c1.5-3.5 4-5.3 8-5.3S18.5 17.5 20 21"></path>
                    </svg>
                    <span>Profile</span>
                </a>
            </nav>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
