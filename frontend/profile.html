<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shora - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <main class="dashboard-page">
        <section class="mobile-app">
            <header class="profile-hero">
                <div class="profile-header">
                    <h1>Profile</h1>
                    <a class="profile-gear" href="settings.html" aria-label="Open settings">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 9 3.09V3a2 2 0 1 1 4 0v.09c0 .65.39 1.24 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 20.91 11H21a2 2 0 1 1 0 4h-.09c-.65 0-1.24.39-1.51 1z"></path>
                        </svg>
                    </a>
                </div>
            </header>

            <section class="profile-section">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div>
                        <h2 id="profileName">Guest User</h2>
                        <p id="profileEmail">No account connected</p>
                    </div>
                </div>

                <div class="profile-stats">
                    <div class="stat-tile">
                        <div class="tile-icon">📘</div>
                        <p>Courses</p>
                        <h3 id="profileCourses">0</h3>
                    </div>
                    <div class="stat-tile">
                        <div class="tile-icon">🏅</div>
                        <p>Badges</p>
                        <h3 id="profileBadges">0</h3>
                    </div>
                    <div class="stat-tile">
                        <div class="tile-icon">⏱</div>
                        <p>Learning Hours</p>
                        <h3 id="profileHours">0</h3>
                    </div>
                </div>

                <div class="profile-list">
                    <button class="profile-item" type="button">
                        <span class="item-icon">⚙️</span>
                        Account Settings
                        <span class="item-action">+</span>
                    </button>
                    <button class="profile-item" type="button">
                        <span class="item-icon">🔔</span>
                        Notification Preferences
                        <span class="item-action">+</span>
                    </button>
                    <button class="profile-item" type="button">
                        <span class="item-icon">❓</span>
                        Help &amp; Support
                        <span class="item-action">?</span>
                    </button>
                </div>
            </section>

            <nav class="bottom-nav" aria-label="Primary">
                <a class="nav-item" href="index.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 10.5 12 3l9 7.5"></path>
                        <path d="M5 10v10h14V10"></path>
                    </svg>
                    <span>Home</span>
                </a>
                <a class="nav-item" href="search.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Search</span>
                </a>
                <a class="nav-item" href="progress.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 5h16v14H4z"></path>
                        <path d="M8 5v14"></path>
                        <path d="M16 5v14"></path>
                    </svg>
                    <span>Progress</span>
                </a>
                <a class="nav-item" href="practice.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3h10v18l-5-3-5 3z"></path>
                    </svg>
                    <span>Practice</span>
                </a>
                <a class="nav-item active" href="profile.html">
                    <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M4 21c1.5-3.5 4-5.3 8-5.3S18.5 17.5 20 21"></path>
                    </svg>
                    <span>Profile</span>
                </a>
            </nav>
        </section>
    </main>
</body>
</html>
