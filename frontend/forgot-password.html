<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shora - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container login-container">
        <div class="login-card forgot-card">
            <div class="login-header">
                <div class="header-icon">🔐</div>
                <h1>Reset Password</h1>
                <p>Enter your registered email and we will send reset instructions.</p>
            </div>

            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <input type="email" id="forgotEmail" name="forgotEmail" placeholder="Email Address" required>
                </div>
                <button type="submit" class="btn btn-signup login-submit">Send Reset Link</button>
            </form>

            <p class="auth-link">Remember password? <a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
